version: '3'

vars:
  BINARY_NAME: osv-scraper
  BUILD_DIR: .
  CMD_DIR: ./cmd/osv-scraper

tasks:
  build:
    desc: Build the osv-scraper binary
    cmds:
      - go build -o {{.BINARY_NAME}} {{.CMD_DIR}}

  help:
    desc: Show help and available commands
    cmds:
      - ./{{.BINARY_NAME}}
    deps:
      - build

  fetch:
    desc: Fetch vulnerability data from OSV API (set OSV_ECOSYSTEMS environment variable)
    cmds:
      - ./{{.BINARY_NAME}} fetch
    deps:
      - build

  check:
    desc: Run all quality checks
    cmds:
      - gofmt -l .
      - goimports -l .
      - golangci-lint run ./...
      - go vet ./...
      - go test -race -shuffle=on ./...
      - go mod tidy
      - git diff --exit-code go.mod go.sum
      - go mod verify
      - govulncheck ./...

  test-cover:
    desc: Run all tests with coverage
    cmds:
      - go test -cover ./...

  report-markdown:
    desc: Generate Markdown report from database
    cmds:
      - ./{{.BINARY_NAME}} report --format=markdown --output-dir=./reports/ --file-prefix=report
    deps:
      - build

  report-diff-markdown:
    desc: Generate differential Markdown report (only new/changed vulnerabilities)
    cmds:
      - ./{{.BINARY_NAME}} report --diff --format=markdown --output-dir=./reports/ --file-prefix=report
    deps:
      - build

  default:
    desc: Show available tasks
    cmds:
      - task --list
